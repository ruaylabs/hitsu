---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  svelte:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check formatting (Biome)
        run: pnpm exec biome format .

      - name: Lint (Biome)
        run: pnpm exec biome lint .

      - name: Check Svelte / TypeScript
        run: pnpm check

      - name: Test frontend
        run: pnpm test

  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: true

      - uses: actions/cache@v6
        with:
          path: |
            src-tauri/target
            chrome-extension/native-host/target
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', 'src-tauri/Cargo.lock', 'chrome-extension/native-host/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Prepare native host sidecar
        run: node scripts/prepare-native-host.mjs

      - name: Check Hitsu formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Check native host formatting
        working-directory: chrome-extension/native-host
        run: cargo fmt --check

      - name: Lint Hitsu
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Lint native host
        working-directory: chrome-extension/native-host
        run: cargo clippy -- -D warnings

      - name: Build Hitsu
        working-directory: src-tauri
        run: cargo build

      - name: Test Hitsu
        working-directory: src-tauri
        run: cargo test

      - name: Test native host
        working-directory: chrome-extension/native-host
        run: cargo test

  e2e:
    needs: [svelte, rust]
    runs-on: ubuntu-24.04
    env:
      TAURI_DRIVER_VERSION: 2.0.6
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Cache tauri-driver
        id: cache-tauri-driver
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/tauri-driver
          key: ${{ runner.os }}-${{ runner.arch }}-tauri-driver-${{ env.TAURI_DRIVER_VERSION }}-${{ hashFiles('rust-toolchain.toml') }}

      - name: Install Tauri and WebDriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --version "$TAURI_DRIVER_VERSION" --locked

      - run: pnpm install --frozen-lockfile

      - name: Run Tauri smoke test
        run: xvfb-run -a pnpm test:e2e
