<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hitsu</title>
    <!-- Render-blocking, so the background still applies before first paint
         (and the native window backgroundColor covers the load itself). An
         external file rather than an inline style tag so style-src-elem
         stays 'self' — see the csp in tauri.conf.json. -->
    <link rel="stylesheet" href="%sveltekit.assets%/init.css" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
