---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  svelte:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check formatting (Biome)
        run: pnpm exec biome format .

      - name: Lint (Biome)
        run: pnpm exec biome lint .

      - name: Check Svelte / TypeScript
        run: pnpm check

      - name: Test frontend
        run: pnpm test

  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: true

      - uses: actions/cache@v6
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Lint (clippy)
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Build
        run: cargo build
        working-directory: src-tauri

      - name: Test
        run: cargo test
        working-directory: src-tauri
